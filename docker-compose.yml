version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: banking_postgres
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bankpass
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: "neo4j/mystrongpass"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    command: ["neo4j", "console"]

  backend:
    build: ./backend
    container_name: fastapi
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mystrongpass
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=banking
      - POSTGRES_USER=bank
      - POSTGRES_PASSWORD=bankpass
    volumes:
      - ./backend:/app
      - ./db:/db

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
