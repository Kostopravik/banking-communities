version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: "neo4j/mystrongpass"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    command: ["neo4j", "console"]

  backend:
    build: ./backend
    container_name: fastapi
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mystrongpass
    volumes:
      - ./backend:/app
      - ./db:/db

volumes:
  neo4j_data:
  neo4j_logs: